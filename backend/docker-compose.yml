services:
  app:
    build:
      context: ..
      dockerfile: docker/orchestrator.Dockerfile
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app
      - /tmp/ui-recommender-artifacts:/tmp/ui-recommender-artifacts
      - ${HOME}/.kube:/root/.kube:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ui_recommender_network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ui_recommender_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ui_recommender_network

  db:
    image: postgres:17
    volumes:
      - ui_recommender_postgres_data:/var/lib/postgresql/data
    ports:
      # ホスト側のポート:コンテナ側のポート
      - "5432:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ui_recommender -d ui_recommender"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - ui_recommender_network

volumes:
  ui_recommender_postgres_data:
  ui_recommender_minio_data:

networks:
  ui_recommender_network:
    driver: bridge
